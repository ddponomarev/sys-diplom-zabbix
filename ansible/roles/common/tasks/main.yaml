---
- name: Update apt cache and fix missing repositories
  apt:
    update_cache: yes
    cache_valid_time: 3600
  become: yes

- name: Install missing GPG keys and fix broken packages
  apt:
    name:
      - ca-certificates
      - gnupg
    state: present
  become: yes

- name: Fix broken packages
  command: apt --fix-broken install -y
  become: yes
  changed_when: false
- name: Update apt cache
  apt:
    update_cache: yes
  become: yes

- name: Install common packages
  apt:
    name:
      - python3
      - python3-pip
      - curl
      - gnupg2
      - dnsutils
    state: present
  become: yes

- name: Install Docker prerequisites
  apt:
    name:
      - apt-transport-https
      - ca-certificates
      - software-properties-common
    state: present
  become: yes

- name: Add Docker GPG apt Key
  apt_key:
    url: https://download.docker.com/linux/ubuntu/gpg
    state: present
  become: yes

- name: Add Docker repository
  apt_repository:
    repo: deb [arch=amd64] https://download.docker.com/linux/ubuntu noble stable
    state: present
  become: yes

- name: Install Docker CE
  apt:
    name:
      - docker-ce
      - docker-ce-cli
      - containerd.io
    state: present
  become: yes

- name: Install Docker Compose plugin
  apt:
    name: docker-compose-plugin
    state: present
  become: yes

- name: Add current user to docker group
  user:
    name: "{{ ansible_user }}"
    groups: docker
    append: yes
  become: yes
